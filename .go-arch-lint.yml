version: 3
workdir: .

allow:
  depOnAnyVendor: false
  deepScan: true

exclude:
  - .codex
  - .git
  - .tmp
  - docs
  - refs
  - resources
  - worktrees

excludeFiles:
  - ".*_test\\.go"

components:
  cmd:
    in: cmd

  interface:
    in: interface/**

  adapter:
    in: adapter/**

  core:
    in:
      - core/**

  library:
    in: library/**

commonComponents:
  - library

deps:
  cmd:
    anyVendorDeps: true
    mayDependOn:
      - interface

  interface:
    anyVendorDeps: true
    mayDependOn:
      - core
      - interface

  adapter:
    anyVendorDeps: true
    mayDependOn:
      - core
      - adapter

  core:
    anyVendorDeps: true
    mayDependOn:
      - core

  library:
    anyVendorDeps: true
    mayDependOn:
      - library
